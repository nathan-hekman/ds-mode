<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240" role="img" aria-label="DS Mode has three states: lite (TLDR only), full (TLDR plus auto HTML), and off (silent).">
  <style>
    .label { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; }
    .title { font-size: 24px; font-weight: 600; fill: #2a2a2a; }
    .accent { font-size: 14px; fill: #b85c2a; }
    .body { font-size: 14px; fill: #6b6b66; }
  </style>
  <rect width="640" height="240" fill="#faf7f0"/>

  <!-- lite -->
  <rect x="40" y="60" width="160" height="150" rx="12" fill="none" stroke="#2a2a2a" stroke-width="1.6"/>
  <text class="label title" x="120" y="100" text-anchor="middle">lite</text>
  <line x1="60" y1="118" x2="180" y2="118" stroke="#2a2a2a" stroke-width="0.8"/>
  <text class="label body" x="120" y="148" text-anchor="middle">TLDR only</text>
  <text class="label body" x="120" y="170" text-anchor="middle">no HTML</text>
  <text class="label body" x="120" y="192" text-anchor="middle">unless asked</text>

  <!-- full (default) -->
  <rect x="220" y="40" width="200" height="190" rx="14" fill="none" stroke="#2a2a2a" stroke-width="2.4"/>
  <text class="label title" x="320" y="84" text-anchor="middle">full</text>
  <text class="label accent" x="320" y="106" text-anchor="middle">default</text>
  <line x1="240" y1="120" x2="400" y2="120" stroke="#2a2a2a" stroke-width="0.8"/>
  <text class="label body" x="320" y="150" text-anchor="middle">TLDR</text>
  <text class="label body" x="320" y="174" text-anchor="middle">+ auto HTML</text>
  <text class="label body" x="320" y="198" text-anchor="middle">when triggered</text>

  <!-- off -->
  <rect x="440" y="60" width="160" height="150" rx="12" fill="none" stroke="#6b6b66" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text class="label title" x="520" y="100" text-anchor="middle" fill="#6b6b66">off</text>
  <line x1="460" y1="118" x2="580" y2="118" stroke="#6b6b66" stroke-width="0.8"/>
  <text class="label body" x="520" y="158" text-anchor="middle">silent</text>
  <text class="label body" x="520" y="182" text-anchor="middle">hooks emit</text>
  <text class="label body" x="520" y="200" text-anchor="middle">nothing</text>
</svg>
