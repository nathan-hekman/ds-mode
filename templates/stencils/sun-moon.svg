<!-- sun-moon.svg — a sun on the left, a moon on the right, a toggle in the
     middle. Use for theme / dark mode answers. Intended container:
     440×200 viewBox. Inherits currentColor. -->
<svg width="440" height="200" viewBox="0 0 440 200" role="img"
     aria-label="A sun and a moon connected by a toggle, suggesting light and dark theme." xmlns="http://www.w3.org/2000/svg">
  <line x1="40" y1="120" x2="400" y2="120" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <!-- sun -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="currentColor" stroke-width="1.6"/>
  <g stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
    <line x1="100" y1="52" x2="100" y2="44"/>
    <line x1="100" y1="156" x2="100" y2="164"/>
    <line x1="52" y1="100" x2="44" y2="100"/>
    <line x1="148" y1="100" x2="156" y2="100"/>
    <line x1="68" y1="68" x2="62" y2="62"/>
    <line x1="132" y1="68" x2="138" y2="62"/>
    <line x1="68" y1="132" x2="62" y2="138"/>
    <line x1="132" y1="132" x2="138" y2="138"/>
  </g>
  <!-- toggle -->
  <g transform="translate(220, 100)">
    <rect x="-26" y="-12" width="52" height="24" rx="12" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.6"/>
    <circle cx="-12" cy="0" r="7" fill="currentColor" opacity="0.85"/>
    <circle cx="12" cy="0" r="7" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.5"/>
  </g>
  <!-- moon -->
  <path d="M 340 70 A 30 30 0 1 0 340 130 A 22 22 0 1 1 340 70 Z" fill="none" stroke="currentColor" stroke-width="1.6"/>
  <circle cx="356" cy="84" r="1.8" fill="currentColor" opacity="0.6"/>
  <circle cx="370" cy="106" r="1.4" fill="currentColor" opacity="0.5"/>
  <circle cx="360" cy="118" r="1.2" fill="currentColor" opacity="0.4"/>
</svg>
