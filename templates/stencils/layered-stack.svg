<!-- layered-stack.svg — three rectangles stacked vertically, each labeled.
     Use for architecture layers, phases, hierarchy. Replace LABEL_TOP /
     LABEL_MID / LABEL_BOT. Intended container: 360×220 viewBox.
     Inherits currentColor. -->
<svg width="360" height="220" viewBox="0 0 360 220" role="img"
     aria-label="A stack of three layers: LABEL_TOP on top, LABEL_MID in the middle, LABEL_BOT at the bottom." xmlns="http://www.w3.org/2000/svg">
  <rect x="60" y="20" width="240" height="50" rx="6" fill="none" stroke="currentColor" stroke-width="1.4"/>
  <text x="180" y="50" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="currentColor">LABEL_TOP</text>
  <rect x="60" y="80" width="240" height="50" rx="6" fill="none" stroke="currentColor" stroke-width="1.4"/>
  <text x="180" y="110" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="currentColor">LABEL_MID</text>
  <rect x="60" y="140" width="240" height="50" rx="6" fill="none" stroke="currentColor" stroke-width="1.4"/>
  <text x="180" y="170" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="currentColor">LABEL_BOT</text>
</svg>
